services:
  - type: web
    name: ecotype-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_SOURCE
        value: huggingface
      - key: HF_REPO_ID
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: PYTHONPATH
        value: .
