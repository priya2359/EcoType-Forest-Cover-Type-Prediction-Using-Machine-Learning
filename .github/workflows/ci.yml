name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        # test_model.py tests auto-skip in CI via @requires_model (skipif PKL not found)
        # test_api.py and test_preprocessing.py run fully — no PKLs needed
