name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api-requirements.txt pytest httpx

      - name: Smoke test imports
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "from api.limiter import limiter; print('limiter OK')"
          python -c "from api.main import app; print('app startup OK')"
          python -c "import importlib.metadata; v=importlib.metadata.version('slowapi'); print(f'slowapi {v} OK')"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          MODEL_VERSION: "1.0.0"
        run: pytest tests/test_api.py tests/test_preprocessing.py -v --tb=short
        # test_model.py auto-skips in CI via @requires_model (PKLs not in repo)
